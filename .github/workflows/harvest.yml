name: Harvest

# Rebuilds `data/` from the curated spine (harvester/data/seed.json) and the
# Wikipedia + Wikidata enrichers, and commits the result back to `main`. Does NOT
# publish to Pages — run the Deploy workflow separately when you're happy with it.
#
# The roster spine is hand-authored in harvester/build_seed.py; this only re-pulls
# the optional enrichment (an illustration, an encyclopedic extract, external
# links). The curated rules and history are authoritative and never overwritten.
#
# Manual-only — the games of the past are a curated set, so no cron.

on:
  workflow_dispatch:
    inputs:
      disable:
        description: "Comma-separated enricher blacklist (e.g. wikipedia,wikidata). Blank disables nothing."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: gotp-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: harvester/requirements.txt

      - name: Install harvester deps
        run: pip install -r harvester/requirements.txt

      - name: Rebuild the curated seed
        run: python -m harvester.build_seed

      - name: Run harvester
        env:
          GAMES_DISABLE: ${{ github.event.inputs.disable }}
        run: python -m harvester

      - name: Commit data changes
        run: |
          git config user.name "gotp-bot"
          git config user.email "gotp-bot@users.noreply.github.com"
          git add data/ harvester/data/seed.json
          if git diff --cached --quiet; then
            echo "no data changes."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%d) (manual harvest)"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Harvest summary" >> $GITHUB_STEP_SUMMARY
          if [ -f data/manifest.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            python -c "import json;m=json.load(open('data/manifest.json'));print(json.dumps({'generated_at':m.get('generated_at'),'totals':m.get('totals'),'sources':m.get('sources')},indent=2))" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run the **Deploy** workflow when ready to publish." >> $GITHUB_STEP_SUMMARY
